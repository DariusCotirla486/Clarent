server:
  port: 8080

spring:
  application:
    name: clarent-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/clarent}
    username: ${DB_USERNAME:clarent_user}
    password: ${DB_PASSWORD:clarent_dev_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

clarent:
  security:
    jwt:
      # Development-only fallback. Override with JWT_SECRET in real environments.
      secret: ${JWT_SECRET:Q2xhcmVudERldlNlY3JldEtleUZvckpXVEhTMjU2U2lnbmluZ0NoYW5nZU1l}
      expiration-minutes: ${JWT_EXPIRATION_MINUTES:720}
  bot:
    auto-start: ${CLARENT_BOT_AUTO_START:true}
    workdir: ${CLARENT_BOT_WORKDIR:..}
    python: ${CLARENT_BOT_PYTHON:python}
    script: ${CLARENT_BOT_SCRIPT:clarent_meeting_listener_bot.py}
    token: ${CLARENT_BOT_TOKEN:dev-bot-token}
    audio-backend: ${CLARENT_BOT_AUDIO_BACKEND:soundcard-loopback}
    audio-device: ${CLARENT_BOT_AUDIO_DEVICE:}
    model-size: ${CLARENT_BOT_MODEL_SIZE:small}
    asr-device: ${CLARENT_BOT_ASR_DEVICE:auto}
    compute-type: ${CLARENT_BOT_COMPUTE_TYPE:int8_float16}
    task: ${CLARENT_BOT_TASK:translate}
    show-browser: ${CLARENT_BOT_SHOW_BROWSER:false}
    ignore-local-mic: ${CLARENT_BOT_IGNORE_LOCAL_MIC:true}
    manager-mic-device: ${CLARENT_BOT_MANAGER_MIC_DEVICE:}
    manager-mic-threshold: ${CLARENT_BOT_MANAGER_MIC_THRESHOLD:0.006}
    manager-mic-hangover-seconds: ${CLARENT_BOT_MANAGER_MIC_HANGOVER_SECONDS:1.6}
    vad-mode: ${CLARENT_BOT_VAD_MODE:auto}
    silero-threshold: ${CLARENT_BOT_SILERO_THRESHOLD:0.5}
    speech-end-silence-seconds: ${CLARENT_BOT_SPEECH_END_SILENCE_SECONDS:1.5}
  questions:
    ollama-url: ${CLARENT_QUESTIONS_OLLAMA_URL:http://127.0.0.1:11434}
    model: ${CLARENT_QUESTIONS_MODEL:qwen3:4b}
    temperature: ${CLARENT_QUESTIONS_TEMPERATURE:0.25}
    context-window: ${CLARENT_QUESTIONS_CONTEXT_WINDOW:4096}
    context-character-limit: ${CLARENT_QUESTIONS_CONTEXT_CHARACTER_LIMIT:8000}
    transcript-character-limit: ${CLARENT_QUESTIONS_TRANSCRIPT_CHARACTER_LIMIT:1800}
